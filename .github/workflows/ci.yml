name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore Nexora.sln
      - run: dotnet build Nexora.sln --no-restore -c Release
      - run: dotnet test Nexora.sln --no-build -c Release --logger trx

  admin-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Clients/nexora-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Clients/nexora-admin/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  portal-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Clients/nexora-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Clients/nexora-portal/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, admin-frontend, portal-frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nexora:ci-test .
