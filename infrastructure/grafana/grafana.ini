[server]
http_port = 3300

[security]
; Credentials should be set via GF_SECURITY_ADMIN_USER and GF_SECURITY_ADMIN_PASSWORD env vars
admin_user = admin
admin_password = admin

[auth.anonymous]
; Set GF_AUTH_ANONYMOUS_ENABLED=true in development if needed
enabled = false
org_role = Viewer

[log]
level = warn
